  /*======================================================

======================================================*/

/*==============================
RESET
==============================*/

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:'Poppins',sans-serif;

background:#020617;

color:#fff;

overflow-x:hidden;

min-height:100vh;

position:relative;

}

/*==============================
ROOT COLOR
==============================*/

:root{

--gold:#FFD54A;
--gold2:#FACC15;
--gold3:#F59E0B;

--green:#22C55E;
--green2:#16A34A;

--red:#EF4444;

--blue:#2563EB;

--white:#ffffff;

--dark:#020617;
--dark2:#0F172A;
--dark3:#111827;

}

/*==============================
BODY BACKGROUND
==============================*/

body{

background:

radial-gradient(circle at top,

#172554 0%,

#0F172A 35%,

#020617 100%);

}

/*==============================
ANIMATED BACKGROUND
==============================*/

body::before{

content:"";

position:fixed;

left:0;
top:0;

width:100%;
height:100%;

background:

linear-gradient(

120deg,

rgba(255,213,74,.08),

transparent,

rgba(34,197,94,.05),

transparent,

rgba(37,99,235,.05)

);

background-size:600% 600%;

animation:bgMove 16s linear infinite;

z-index:-5;

}

@keyframes bgMove{

0%{

background-position:0% 50%;

}

50%{

background-position:100% 50%;

}

100%{

background-position:0% 50%;

}

}

/*==============================
GRID
==============================*/

body::after{

content:"";

position:fixed;

inset:0;

background-image:

linear-gradient(

rgba(255,213,74,.05) 1px,

transparent 1px),

linear-gradient(

90deg,

rgba(255,213,74,.05) 1px,

transparent 1px);

background-size:45px 45px;

pointer-events:none;

z-index:-4;

}

/*==============================
FLOATING GLOW
==============================*/

.glow{

position:fixed;

border-radius:999px;

filter:blur(90px);

opacity:.5;

pointer-events:none;

animation:floatGlow 14s ease-in-out infinite;

}

.glow1{

width:280px;

height:280px;

background:#FFD54A;

top:-80px;

left:-80px;

}

.glow2{

width:340px;

height:340px;

background:#16A34A;

right:-100px;

bottom:-80px;

animation-delay:3s;

}

.glow3{

width:250px;

height:250px;

background:#2563EB;

top:30%;

left:40%;

animation-delay:6s;

}

@keyframes floatGlow{

0%{

transform:translate(0,0) scale(1);

}

50%{

transform:

translate(30px,-40px)

scale(1.15);

}

100%{

transform:translate(0,0) scale(1);

}

}

/*==============================
CONTAINER
==============================*/

.container{

width:100%;

max-width:1280px;

margin:auto;

padding:40px 20px;

}

/*==============================
GLASS
==============================*/

.glass{

background:

rgba(255,255,255,.06);

backdrop-filter:blur(22px);

border:1px solid rgba(255,255,255,.08);

}

/*==============================
GOLD FRAME
==============================*/

.gold-frame{

position:relative;

padding:3px;

border-radius:34px;

background:

linear-gradient(

145deg,

#FFF8DC,

#FFD54A,

#FACC15,

#B45309,

#FFF8DC

);

box-shadow:

0 0 30px rgba(255,213,74,.35),

0 0 80px rgba(255,213,74,.15);

overflow:hidden;

}

/*==============================
SHINE EFFECT
==============================*/

.gold-frame::before{

content:"";

position:absolute;

top:-150%;

left:-40%;

width:40%;

height:400%;

background:

linear-gradient(

90deg,

transparent,

rgba(255,255,255,.55),

transparent

);

transform:rotate(25deg);

animation:frameShine 6s linear infinite;

}

@keyframes frameShine{

100%{

left:160%;

}

}

/*==============================
CARD
==============================*/

.card{

background:

rgba(2,6,23,.75);

backdrop-filter:blur(25px);

border-radius:30px;

overflow:hidden;

padding:35px;

}

/*==============================
TITLE
==============================*/

.title{

font-size:58px;

font-weight:900;

text-align:center;

letter-spacing:3px;

background:

linear-gradient(

90deg,

#ffffff,

#FFD54A,

#FACC15,

#ffffff

);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

text-shadow:

0 0 25px rgba(255,213,74,.5);

}

.subtitle{

margin-top:10px;

text-align:center;

font-size:18px;

color:#FFE082;

font-weight:600;

}

/*==============================
CHECK ICON
==============================*/

.success-icon{

width:140px;

height:140px;

margin:auto;

border-radius:50%;

background:

linear-gradient(

145deg,

#22C55E,

#16A34A);

display:flex;

justify-content:center;

align-items:center;

font-size:70px;

font-weight:900;

box-shadow:

0 0 30px rgba(34,197,94,.5),

0 0 80px rgba(34,197,94,.2);

animation:successPulse 2.2s infinite;

}

@keyframes successPulse{

50%{

transform:scale(1.08);

}

}

/*==============================
RESPONSIVE
==============================*/

@media(max-width:768px){

.title{

font-size:38px;

}

.card{

padding:22px;

}

.success-icon{

width:110px;

height:110px;

font-size:56px;

}

}

/*======================================================
PART 1B
DETAIL CARD • PREMIUM TICKET • QR • BARCODE
======================================================*/

/*==============================
SECTION
==============================*/

.section{

margin-top:45px;

}

.grid2{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:28px;

}

@media(max-width:900px){

.grid2{

grid-template-columns:1fr;

}

}

/*==============================
DETAIL CARD
==============================*/

.detail-card{

position:relative;

background:

linear-gradient(

145deg,

rgba(255,255,255,.05),

rgba(255,255,255,.02)

);

border:1px solid rgba(255,213,74,.18);

border-radius:26px;

padding:26px;

overflow:hidden;

transition:.35s;

}

.detail-card:hover{

transform:translateY(-6px);

box-shadow:

0 20px 45px rgba(255,213,74,.18);

}

.detail-card::before{

content:"";

position:absolute;

top:0;

left:0;

width:6px;

height:100%;

background:

linear-gradient(

180deg,

#FFD54A,

#F59E0B,

#22C55E

);

}

.detail-title{

font-size:24px;

font-weight:800;

color:#FFD54A;

margin-bottom:20px;

letter-spacing:1px;

}

.info-row{

display:flex;

justify-content:space-between;

align-items:center;

padding:14px 0;

border-bottom:1px solid rgba(255,255,255,.06);

}

.info-row:last-child{

border:none;

}

.info-label{

color:#9CA3AF;

font-size:14px;

font-weight:600;

}

.info-value{

font-size:16px;

font-weight:700;

color:white;

text-align:right;

}

/*==============================
STATUS
==============================*/

.badge-paid{

display:inline-flex;

align-items:center;

gap:8px;

padding:10px 18px;

border-radius:999px;

background:

linear-gradient(

145deg,

#22C55E,

#16A34A

);

font-weight:800;

color:white;

box-shadow:

0 0 20px rgba(34,197,94,.45);

animation:badgePulse 2s infinite;

}

@keyframes badgePulse{

50%{

transform:scale(1.05);

}

}

/*==============================
PREMIUM TICKET
==============================*/

.ticket{

position:relative;

margin-top:55px;

border-radius:34px;

overflow:hidden;

background:

linear-gradient(

145deg,

#111827,

#030712,

#111827

);

border:2px solid rgba(255,213,74,.22);

box-shadow:

0 25px 55px rgba(0,0,0,.45);

}

.ticket::before{

content:"";

position:absolute;

top:-200%;

left:-40%;

width:40%;

height:500%;

background:

linear-gradient(

90deg,

transparent,

rgba(255,255,255,.22),

transparent

);

transform:rotate(25deg);

animation:ticketShine 6s infinite;

}

@keyframes ticketShine{

100%{

left:170%;

}

}

.ticket-header{

padding:30px;

background:

linear-gradient(

90deg,

rgba(255,213,74,.08),

transparent

);

border-bottom:1px solid rgba(255,213,74,.15);

}

.ticket-title{

font-size:34px;

font-weight:900;

color:#FFD54A;

letter-spacing:2px;

}

.ticket-sub{

margin-top:6px;

color:#d1d5db;

font-size:15px;

}

.ticket-body{

display:grid;

grid-template-columns:1fr 320px;

gap:35px;

padding:35px;

}

@media(max-width:950px){

.ticket-body{

grid-template-columns:1fr;

}

}

/*==============================
QR CARD
==============================*/

.qr-card{

background:white;

padding:18px;

border-radius:26px;

box-shadow:

0 20px 45px rgba(255,255,255,.18);

animation:qrFloat 4s ease-in-out infinite;

}

@keyframes qrFloat{

50%{

transform:

translateY(-8px);

}

}

.qr-card img{

width:100%;

display:block;

border-radius:14px;

}

/*==============================
BARCODE
==============================*/

.barcode{

margin-top:20px;

height:82px;

border-radius:14px;

background:

repeating-linear-gradient(

90deg,

#000 0,

#000 2px,

#fff 2px,

#fff 4px,

#000 4px,

#000 5px,

#fff 5px,

#fff 8px,

#000 8px,

#000 10px

);

}

.barcode-text{

margin-top:14px;

text-align:center;

letter-spacing:8px;

font-size:13px;

font-weight:700;

color:#cbd5e1;

word-break:break-all;

}

/*==============================
RIBBON
==============================*/

.ribbon{

position:absolute;

top:28px;

right:-58px;

padding:12px 70px;

background:

linear-gradient(

145deg,

#22C55E,

#16A34A

);

color:white;

font-size:14px;

font-weight:900;

transform:rotate(45deg);

letter-spacing:2px;

box-shadow:

0 0 20px rgba(34,197,94,.5);

}

/*==============================
HOLOGRAM
==============================*/

.hologram{

position:absolute;

right:25px;

bottom:25px;

width:90px;

height:90px;

border-radius:50%;

background:

conic-gradient(

#FFD54A,

#22C55E,

#2563EB,

#EF4444,

#FFD54A

);

filter:blur(1px);

opacity:.8;

animation:holoRotate 6s linear infinite;

}

@keyframes holoRotate{

100%{

transform:rotate(360deg);

}

}

/*======================================================
PART 1C
BUTTON • PARTICLE • CONFETTI • FIREWORK • FOOTER
======================================================*/

/*==============================
BUTTON GROUP
==============================*/

.button-group{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:18px;

margin-top:40px;

}

@media(max-width:850px){

.button-group{

grid-template-columns:1fr;

}

}

/*==============================
PREMIUM BUTTON
==============================*/

.btn{

position:relative;

overflow:hidden;

border:none;

outline:none;

cursor:pointer;

padding:18px 22px;

border-radius:18px;

font-size:16px;

font-weight:800;

letter-spacing:1px;

transition:.35s;

color:#fff;

}

.btn::before{

content:"";

position:absolute;

top:0;

left:-120%;

width:60%;

height:100%;

background:

linear-gradient(

90deg,

transparent,

rgba(255,255,255,.45),

transparent);

transform:skewX(-30deg);

transition:.8s;

}

.btn:hover::before{

left:180%;

}

.btn:hover{

transform:

translateY(-4px)

scale(1.02);

}

.btn-download{

background:

linear-gradient(

145deg,

#FFD54A,

#F59E0B);

color:#111827;

box-shadow:

0 15px 35px rgba(245,158,11,.35);

}

.btn-share{

background:

linear-gradient(

145deg,

#22C55E,

#16A34A);

box-shadow:

0 15px 35px rgba(34,197,94,.35);

}

.btn-home{

background:

linear-gradient(

145deg,

#2563EB,

#1D4ED8);

box-shadow:

0 15px 35px rgba(37,99,235,.35);

}

/*==============================
PARTICLE
==============================*/

.particle{

position:fixed;

width:6px;

height:6px;

border-radius:50%;

background:#FFD54A;

pointer-events:none;

animation:particleFloat linear infinite;

opacity:.5;

}

@keyframes particleFloat{

0%{

transform:

translateY(100vh)

scale(.3);

opacity:0;

}

20%{

opacity:1;

}

100%{

transform:

translateY(-120px)

scale(1);

opacity:0;

}

}

/*==============================
CONFETTI
==============================*/

.confetti{

position:fixed;

width:12px;

height:18px;

pointer-events:none;

z-index:9999;

animation:confettiFall linear forwards;

}

@keyframes confettiFall{

0%{

transform:

translateY(-40px)

rotate(0deg);

opacity:1;

}

100%{

transform:

translateY(110vh)

rotate(720deg);

opacity:0;

}

}

/*==============================
FIREWORK
==============================*/

.firework{

position:fixed;

width:8px;

height:8px;

border-radius:50%;

pointer-events:none;

z-index:9999;

animation:explode .9s ease-out forwards;

}

@keyframes explode{

0%{

transform:scale(1);

opacity:1;

}

100%{

transform:

translate(

var(--x),

var(--y))

scale(0);

opacity:0;

}

}

/*==============================
GLOW BORDER
==============================*/

.glow-border{

position:absolute;

inset:0;

border-radius:34px;

border:2px solid rgba(255,213,74,.15);

animation:borderGlow 4s linear infinite;

pointer-events:none;

}

@keyframes borderGlow{

0%{

box-shadow:

0 0 10px rgba(255,213,74,.15);

}

50%{

box-shadow:

0 0 40px rgba(255,213,74,.45);

}

100%{

box-shadow:

0 0 10px rgba(255,213,74,.15);

}

}

/*==============================
FOOTER
==============================*/

.footer{

margin-top:60px;

text-align:center;

color:#94A3B8;

font-size:14px;

line-height:1.9;

}

.footer b{

color:#FFD54A;

}

.footer .copyright{

margin-top:10px;

font-size:13px;

opacity:.7;

}

/*==============================
SCROLLBAR
==============================*/

::-webkit-scrollbar{

width:10px;

}

::-webkit-scrollbar-track{

background:#020617;

}

::-webkit-scrollbar-thumb{

background:#FFD54A;

border-radius:50px;

}

::-webkit-scrollbar-thumb:hover{

background:#F59E0B;

}

/*==============================
ANIMATION CLASS
==============================*/

.fade-up{

animation:fadeUp .8s ease both;

}

@keyframes fadeUp{

from{

opacity:0;

transform:

translateY(40px);

}

to{

opacity:1;

transform:none;

}

}

.zoom{

animation:zoom .8s ease both;

}

@keyframes zoom{

from{

opacity:0;

transform:scale(.8);

}

to{

opacity:1;

transform:scale(1);

}

}

.rotate{

animation:rotateIn 1s ease both;

}

@keyframes rotateIn{

from{

opacity:0;

transform:

rotate(-25deg)

scale(.7);

}

to{

opacity:1;

transform:

rotate(0)

scale(1);

}

}

/*==============================
RESPONSIVE
==============================*/

@media(max-width:768px){

.ticket-header{

padding:22px;

}

.ticket-title{

font-size:26px;

}

.ticket-body{

padding:22px;

gap:24px;

}

.detail-card{

padding:20px;

}

.info-row{

flex-direction:column;

align-items:flex-start;

gap:6px;

}

.barcode{

height:65px;

}

.button-group{

gap:14px;

}

.btn{

padding:16px;

font-size:15px;

}

}

/*==============================
END CSS
==============================*/

<script>

rupiah(data.total);

/*=========================

=========================*/

const confettiContainer=

document.getElementById(

"confettiContainer"

);

const confettiColor=[

"#FFD54A",

"#22C55E",

"#2563EB",

"#EF4444",

"#ffffff"

];

function confetti(){

for(let i=0;i<150;i++){

const div=

document.createElement("div");

div.className="confetti";

div.style.left=

Math.random()*100+"vw";

div.style.top="-20px";

div.style.background=

confettiColor[

Math.floor(

)

];

div.style.transform=

"rotate("+Math.random()*360+"deg)";

confettiContainer.appendChild(div);

},8000);

}

}

);

 /*=========================================================
PART 3C

=========================================================*/

/*=========================
FIREWORK CANVAS
=========================*/

const canvas=document.getElementById("fireworks");

const ctx=canvas.getContext("2d");

function resizeCanvas(){

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

}

resizeCanvas();

window.addEventListener("resize",resizeCanvas);

let fireworks=[];

class Fire{

constructor(){

this.x=Math.random()*canvas.width;

this.y=Math.random()*canvas.height*.45;

this.color=

["#FFD54A","#22C55E","#2563EB","#EF4444","#FFFFFF"]

[Math.floor(Math.random()*5)];

this.list=[];

for(let i=0;i<70;i++){

this.list.push({

x:this.x,

y:this.y,

dx:(Math.random()-.5)*8,

dy:(Math.random()-.5)*8,

life:100

});

}

}

draw(){

this.list.forEach(p=>{

ctx.beginPath();

ctx.fillStyle=this.color;

ctx.arc(p.x,p.y,2,0,6.28);

ctx.fill();

p.x+=p.dx;

p.y+=p.dy;

p.life--;

});

}

alive(){

return this.list.some(a=>a.life>0);

}

}

function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height);

fireworks.forEach(f=>f.draw());

fireworks=fireworks.filter(f=>f.alive());

requestAnimationFrame(loop);

}

loop();

setInterval(()=>{

fireworks.push(new Fire());

},900);

"success.mp3"
