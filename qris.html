<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Pembayaran QRIS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:'Poppins',sans-serif;

}

body{

background:#121212;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

padding:15px;

}

.container{

width:100%;

max-width:520px;

background:#ffffff;

border-radius:20px;

overflow:hidden;

box-shadow:
0 10px 35px rgba(0,0,0,.25);

}

/* HEADER */

.header{

background:linear-gradient(135deg,#00c853,#00e676);

padding:25px;

text-align:center;

color:#fff;

}

.header h1{

font-size:30px;

font-weight:800;

}

.header p{

margin-top:6px;

font-size:14px;

opacity:.9;

}

/* TIMER */

.timer{

padding:20px;

background:#fafafa;

text-align:center;

border-bottom:1px solid #eee;

}

.timer small{

display:block;

color:#777;

margin-bottom:10px;

}

#timer{

font-size:48px;

font-weight:800;

color:#00a651;

transition:.3s;

}

.warning{

color:#d50000 !important;

animation:blink .8s infinite;

}

@keyframes blink{

0%{opacity:1;}

50%{opacity:.2;}

100%{opacity:1;}

}

/* QRIS */

.qris{

padding:25px;

text-align:center;

}

.qris img{

width:100%;

max-width:280px;

display:block;

margin:auto;

border-radius:10px;

border:1px solid #ddd;

}

/* TOTAL */

.total{

margin-top:20px;

border-top:2px dashed #ddd;

padding-top:20px;

}

.total span{

display:block;

color:#666;

font-size:15px;

}

#total{

margin-top:6px;

font-size:38px;

font-weight:800;

color:#00a651;

}

/* DATA */

.info{

margin-top:25px;

}

.item{

display:flex;

justify-content:space-between;

padding:12px 0;

border-bottom:1px dashed #eee;

}

.label{

color:#777;

}

.value{

font-weight:700;

color:#222;

}

/* STATUS */

#status{

margin-top:18px;

text-align:center;

font-weight:bold;

color:#d50000;

}

/* BUTTON */

.btn{

width:100%;

margin-top:18px;

padding:15px;

border:none;

border-radius:12px;

background:#00c853;

color:white;

font-size:17px;

font-weight:700;

cursor:pointer;

}

.btn:hover{

background:#00a651;

}

@media(max-width:600px){

.container{

border-radius:0;

min-height:100vh;

}

#timer{

font-size:42px;

}

#total{

font-size:30px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>PEMBAYARAN QRIS</h1>

<p>Silakan selesaikan pembayaran sebelum waktu habis.</p>

</div>

<div class="timer">

<small>Sisa Waktu Pembayaran</small>

<div id="timer">03:00</div>

</div>

<div class="qris">

<img src="qris.png" alt="QRIS">

<div class="total">

<span>Total Pembayaran</span>

<div id="total">Rp 0</div>

</div>

<div class="info">

<div class="item">

<div class="label">Nama</div>

<div class="value" id="nama">-</div>

</div>

<div class="item">

<div class="label">Jenis Tiket</div>

<div class="value" id="jenis">-</div>

</div>

<div class="item">

<div class="label">Jumlah Tiket</div>

<div class="value" id="jumlah">0</div>

</div>

<div class="item">

<div class="label">WhatsApp</div>

<div class="value" id="wa">-</div>

</div>

<div id="status"></div>

</div>

<button class="btn" onclick="restartTimer()">
Refresh QRIS
</button>

<button
class="btn"
id="btnBayar"
style="
background:#1565c0;
margin-top:10px;
">
Saya Sudah Membayar
</button>

</div>

</div>

<script>

/*====================================
AMBIL DATA DARI LOCAL STORAGE
====================================*/

const total =
Number(localStorage.getItem("totalPembayaran") || 0);

const nama =
localStorage.getItem("nama") || "-";

const jenis =
localStorage.getItem("jenisTiket") || "-";

const jumlah =
localStorage.getItem("jumlahTiket") || "0";

const wa =
localStorage.getItem("wa") || "-";

/*====================================
TAMPILKAN DATA
====================================*/

document.getElementById("nama").textContent =
nama;

document.getElementById("jenis").textContent =
jenis;

document.getElementById("jumlah").textContent =
jumlah;

document.getElementById("wa").textContent =
wa;

document.getElementById("total").textContent =
"Rp " +
total.toLocaleString("id-ID");

/*====================================
VALIDASI DATA
====================================*/

if(total<=0){

document.getElementById("status").innerHTML=

"⚠️ Data pembayaran tidak ditemukan.";

}

/*====================================
TIMER
====================================*/

const DURASI = 180;

let sisa = DURASI;

let interval = null;

function updateTimer(){

const menit =
Math.floor(sisa/60);

const detik =
sisa%60;

const el =
document.getElementById("timer");

el.innerHTML=

String(menit).padStart(2,"0")
+
":"
+
String(detik).padStart(2,"0");

if(sisa<=15){

el.classList.add("warning");

}else{

el.classList.remove("warning");

}

if(sisa<=0){

clearInterval(interval);

document.getElementById("status").innerHTML=

"❌ QRIS EXPIRED<br>Silakan Refresh QRIS";

return;

}

sisa--;

}

function startTimer(){

clearInterval(interval);

sisa=DURASI;

document.getElementById("status").innerHTML="";

updateTimer();

interval=setInterval(updateTimer,1000);

}

function restartTimer(){

startTimer();

}

startTimer();

/*====================================
BUTTON BAYAR
====================================*/

document
.getElementById("btnBayar")
.addEventListener("click",function(){

localStorage.setItem(
"statusPembayaran",
"menunggu"
);

window.location.href=
"loading.html";

});



/*====================================
AUTO CEK STATUS PEMBAYARAN
====================================*/

function cekStatusPembayaran(){

const status =
localStorage.getItem("statusPembayaran");

/*
Status yang didukung:

menunggu
berhasil
gagal

*/

if(status==="berhasil"){

window.location.href="success.html";

return;

}

if(status==="gagal"){

window.location.href="gagal.html";

return;

}

}

/*====================================
AUTO CEK SETIAP 2 DETIK
====================================*/

setInterval(cekStatusPembayaran,2000);

/*====================================
JIKA TIMER HABIS
====================================*/

function timerExpired(){

clearInterval(interval);

document.getElementById("timer")
.innerHTML="00:00";

document.getElementById("timer")
.classList.add("warning");

document.getElementById("status")
.innerHTML=
"❌ QRIS EXPIRED<br>Silakan Refresh QRIS";

document
.getElementById("btnBayar")
.disabled=true;

document
.getElementById("btnBayar")
.style.opacity=".5";

}

/*====================================
UBAH FUNGSI UPDATE TIMER
====================================*/

clearInterval(interval);

sisa=DURASI;

interval=setInterval(function(){

const menit=Math.floor(sisa/60);

const detik=sisa%60;

const el=document.getElementById("timer");

el.innerHTML=

String(menit).padStart(2,"0")
+
":"
+
String(detik).padStart(2,"0");

if(sisa<=15){

el.classList.add("warning");

}else{

el.classList.remove("warning");

}

if(sisa<=0){

timerExpired();

return;

}

sisa--;

},1000);

/*====================================
SELESAI
====================================*/

</script>

</body>
</html>
