<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Poliponi</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{overflow:hidden;background:#040510}
.screen{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;background:radial-gradient(circle at top,#34125a,#040510 60%);}
.grid{position:absolute;inset:0;opacity:.08;background-image:linear-gradient(rgba(34,211,238,.3) 1px,transparent 1px),linear-gradient(90deg,rgba(34,211,238,.3) 1px,transparent 1px);background-size:30px 30px}
.box{width:min(94vw,430px);text-align:center;color:#fff;z-index:2;padding:10px}
.ring{width:140px;height:140px;margin:auto;position:relative}
.ring:before,.ring:after{content:"";position:absolute;inset:0;border-radius:50%;border:4px solid transparent}
.ring:before{border-top-color:#ff4df8;border-right-color:#ff4df8;animation:spin 4s linear infinite}
.ring:after{border-left-color:#22d3ee;border-bottom-color:#22d3ee;animation:spinr 6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}@keyframes spinr{to{transform:rotate(-360deg)}}
.logo{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.logo img{width:82px;height:82px;object-fit:contain;filter:drop-shadow(0 0 12px #fff) drop-shadow(0 0 20px #22d3ee)}
h1{font-size:30px;margin-top:12px}
.sub{font-size:12px;letter-spacing:4px;color:#cbd5e1}
#ecg{width:100%;height:70px;margin:18px 0}
.progress{display:flex;justify-content:center;gap:3px;margin:15px 0}
.seg{width:7px;height:15px;background:#1f2937;border-radius:3px}
.on{background:linear-gradient(#ff4df8,#22d3ee);box-shadow:0 0 10px #22d3ee}
.statusbox{margin-top:10px;padding:14px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);border-radius:16px}
.title{font-size:11px;letter-spacing:3px;color:#94a3b8;margin-bottom:8px}
#status{min-height:48px;font-size:15px;line-height:1.5}
.badges{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.badges span{font-size:11px;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.05)}
canvas.wave{position:absolute;left:0;bottom:0;width:100%;height:90px}
</style>
</head>
<body>
<div class="screen">
<div class="grid"></div>
<div class="box">
<div class="ring">
<div class="logo"><img src="logo-event.png" alt="Logo Event"></div>
</div>
<h1>POLIPONI BALI</h1>
<div class="sub">LOADING</div>
<canvas id="ecg"></canvas>
<div class="progress" id="progress"></div>

<div class="statusbox">
<div class="title">SYSTEM STATUS</div>
<div id="status">Memulai sinkronisasi sistem festival...</div>
</div>

<div class="badges">
<span>✓ Data Verified</span>
<span>✓ Payment Verified</span>
<span>✓ Ticket Generated</span>
</div>
</div>
<canvas class="wave" id="wave"></canvas>
</div>

<script>
const messages=[
"Memulai sinkronisasi sistem festival...",
"Memverifikasi data peserta...",
"Memeriksa integritas transaksi...",
"Menghubungkan pusat data festival...",
"Memvalidasi informasi pemesanan...",
"Menyiapkan tiket digital dan QR Access...",
"Mengamankan data registrasi...",
"Memvalidasi QR Ticket...",
"Sinkronisasi database berhasil...",
"Melakukan pemeriksaan akhir sistem...",
"Finalisasi registrasi festival...",
"Registrasi berhasil. Mengalihkan halaman..."
];
let idx=0;
setInterval(()=>{
 if(idx<messages.length-1){
   document.getElementById('status').textContent=messages[++idx];
 }
},25000);

const progress=document.getElementById('progress');
for(let i=0;i<60;i++){let d=document.createElement('div');d.className='seg';progress.appendChild(d);}
const segs=[...document.querySelectorAll('.seg')];

const total=300000,start=Date.now();
(function run(){
 const p=Math.min(100,(Date.now()-start)/total*100);
 const active=Math.floor((p/100)*60);
 segs.forEach((s,i)=>s.classList.toggle('on',i<active));
 if(p<100) requestAnimationFrame(run);
 else location.href='success.html';
})();

const ecg=document.getElementById('ecg'),ctx=ecg.getContext('2d');
function rs(){ecg.width=ecg.offsetWidth;ecg.height=70;} rs(); addEventListener('resize',rs);
let off=0;
function drawECG(){
 off+=5;
 ctx.clearRect(0,0,ecg.width,ecg.height);
 ctx.beginPath();
 for(let x=0;x<ecg.width;x++){
  let t=(x+off)%220,y=35;
  if(t>70&&t<85)y=35-(t-70)*1.7;
  if(t>=85&&t<100)y=10+(t-85)*3.2;
  if(t>=100&&t<115)y=58-(t-100)*1.5;
  x?ctx.lineTo(x,y):ctx.moveTo(x,y);
 }
 ctx.strokeStyle='#22d3ee';ctx.lineWidth=3;ctx.shadowBlur=15;ctx.shadowColor='#22d3ee';ctx.stroke();
 requestAnimationFrame(drawECG);
}
drawECG();

const w=document.getElementById('wave'),wx=w.getContext('2d');
function wr(){w.width=innerWidth;w.height=90;}wr();addEventListener('resize',wr);
function wave(){
 wx.clearRect(0,0,w.width,w.height);
 wx.beginPath();
 for(let i=0;i<w.width;i++){
   let y=45+Math.sin((i+Date.now()/10)/45)*10;
   i?wx.lineTo(i,y):wx.moveTo(i,y);
 }
 wx.strokeStyle='#22d3ee';wx.lineWidth=3;wx.shadowBlur=15;wx.shadowColor='#22d3ee';wx.stroke();
 requestAnimationFrame(wave);
}
wave();
</script>
</body>
</html>
